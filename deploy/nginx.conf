# Example host nginx reverse proxy for the Zmanim app (Docker container on
# 127.0.0.1:3000). Replace the server_name and add your TLS config.
#
# IMPORTANT: remove any old `location /zmanim { proxy_pass ... }` rule — the new
# app owns the /zmanim/* routes and serves them itself.

server {
    listen 80;
    listen [::]:80;
    server_name zmanim.example.com;

    # Redirect to HTTPS (terminate TLS here or at an upstream proxy).
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # Next.js immutable build assets — cache aggressively.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
